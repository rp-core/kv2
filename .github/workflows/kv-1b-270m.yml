name: KV Cache 생성 [1B + 270m 전담]

on:
  workflow_dispatch:
    inputs:
      story_id:
        description: '스토리 ID'
        required: true

env:
  CACHE_TYPE_K: q8_0
  CACHE_TYPE_V: q4_0
  KV_VERSION: "7"
  N_KEEP: 512
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-kv:
    name: "KV 생성 [${{ matrix.model_id }}]"
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        include:
          - model_id: gemma-3-1b-qat
            hf_repo: stduhpf/google-gemma-3-1b-it-qat-q4_0-gguf-small
            hf_file: gemma-3-1b-it-q4_0_s.gguf
            n_ctx: 4096
            rope_freq_base: 10000

          - model_id: gemma-3-270m
            hf_repo: bartowski/google_gemma-3-270m-it-qat-G
